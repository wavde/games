<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>mini-sudoku · games</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="description" content="Mini Sudoku — 6×6 grid with 2×3 boxes. Three difficulties, daily puzzle, pencil marks.">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="apple-touch-icon" href="../favicon.svg">
<link rel="manifest" href="../manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../shared.css">
<link rel="stylesheet" href="../manpage.css">
<style>
  .sk-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 0;
    width: min(420px, 92vw);
    aspect-ratio: 1;
    margin: 8px auto;
    border: 2px solid var(--accent);
    background: var(--bg-2);
  }
  .sk-cell {
    position: relative;
    border: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.4rem, 6.5vw, 2rem);
    font-weight: 500;
    color: var(--fg);
    cursor: pointer;
    user-select: none;
    min-width: 0;
  }
  /* Thick box boundaries (2×3 boxes: rows 0,1,2 break between 1-2, 3-4; cols 0..5 break at 2-3). */
  .sk-cell[data-r="1"], .sk-cell[data-r="3"] { border-bottom: 2px solid var(--accent); }
  .sk-cell[data-c="2"] { border-right: 2px solid var(--accent); }
  .sk-cell.given { color: var(--muted); background: var(--bg-2); font-weight: 700; }
  .sk-cell.sel { outline: 2px solid var(--accent); outline-offset: -2px; z-index: 1; }
  .sk-cell.peer { background: var(--panel-2); }
  .sk-cell.same-num { color: var(--accent); }
  .sk-cell.conflict { color: var(--danger); }
  .sk-cell .notes {
    position: absolute;
    inset: 3px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    font-size: clamp(0.55rem, 2vw, 0.75rem);
    color: var(--muted);
    pointer-events: none;
  }
  .sk-cell .notes span { display: flex; align-items: center; justify-content: center; }

  .sk-pad {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    width: min(420px, 92vw);
    margin: 8px auto 0;
  }
  .sk-pad button {
    aspect-ratio: 1;
    padding: 0;
    min-height: 40px;
    font-size: 1.1rem;
    font-weight: 500;
  }
  .sk-pad button.done { opacity: 0.35; }
  .sk-pad .pencil-on { color: var(--accent); border-color: var(--accent); background: rgba(245,197,66,0.08); }

  .game-controls { display: flex; justify-content: center; align-items: center; gap: 12px; flex-wrap: wrap; margin: 8px 0; }
</style>
</head>
<body>
<main class="wrap">
  <div class="topbar">
    <h1>mini-sudoku</h1>
    <a class="back" href="../">← all games</a>
  </div>
  <div class="panel">
    <div class="row">
      <p class="status" id="status">Fill each row, column, and 2×3 box with 1–6.</p>
      <p class="status">Time: <span id="time">0:00</span> · Best: <span id="best">—</span></p>
      <button class="btn ghost tool-btn man-trigger" data-man="mini-sudoku" data-man-title="MINI-SUDOKU(1)" type="button">
        <span class="q">?</span> man
      </button>
    </div>
    <div class="game-controls">
      <div class="chips" id="chips" role="tablist" aria-label="Difficulty">
        <button class="chip" data-diff="easy" role="tab" type="button">Easy</button>
        <button class="chip" data-diff="medium" role="tab" type="button">Medium</button>
        <button class="chip" data-diff="hard" role="tab" type="button">Hard</button>
      </div>
      <button class="btn ghost tool-btn" id="new-btn" type="button"><span class="glyph">↻</span> new</button>
    </div>
    <div class="sk-grid" id="board"></div>
    <div class="sk-pad" id="pad"></div>
    <div class="toolbar">
      <button class="btn ghost tool-btn" id="undo-btn" type="button"><span class="glyph">↶</span> undo</button>
      <button class="btn ghost tool-btn" id="reset-btn" type="button"><span class="glyph">↻</span> reset</button>
    </div>
  </div>
</main>

<template id="man-mini-sudoku">
  <h2>Name</h2>
  <p>mini-sudoku — 6×6 sudoku with 2×3 boxes.</p>

  <h2>Rules</h2>
  <ul>
    <li>Fill every empty cell with a digit from <strong>1 to 6</strong>.</li>
    <li>No digit may repeat in any <strong>row</strong>, any <strong>column</strong>, or any <strong>2×3 box</strong> (boxes are outlined in amber).</li>
    <li>Pre-filled cells (dim) are fixed and can't be changed.</li>
  </ul>

  <h2>Controls</h2>
  <ul>
    <li><strong>Tap a cell</strong> to select it, then tap a number in the pad to place it.</li>
    <li>Tap <code>✎ pencil</code> to toggle pencil-mark mode; number taps then toggle candidates instead of placing a value.</li>
    <li><code>⌫</code> clears the selected cell.</li>
    <li>Keyboard: arrow keys move, <span class="k">1</span>–<span class="k">6</span> place a digit, <span class="k">P</span> toggles pencil, <span class="k">Del</span>/<span class="k">Backspace</span> clears.</li>
    <li><code>↶ undo</code> takes back one entry. <code>↻ reset</code> clears all your entries.</li>
    <li><code>↻ new</code> generates a fresh puzzle at the current difficulty.</li>
  </ul>

  <h2>Difficulty</h2>
  <ul>
    <li><strong>Easy</strong> — ~22 clues given. <strong>Medium</strong> — ~18 clues. <strong>Hard</strong> — ~14 clues.</li>
    <li>Every puzzle has exactly one solution.</li>
  </ul>
</template>

<script defer src="../manpage.js"></script>
<script defer src="../gamekit.js"></script>
<script defer src="game.js"></script>
</body>
</html>
