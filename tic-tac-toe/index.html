<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>tic-tac-toe · games</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="description" content="Tic-Tac-Toe with unbeatable minimax AI.">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="apple-touch-icon" href="../favicon.svg">
<link rel="manifest" href="../manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../shared.css">
<link rel="stylesheet" href="../manpage.css">
<style>
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 6px;
    width: min(360px, 90vw);
    aspect-ratio: 1;
    margin: 0 auto;
  }
  .cell {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    font-size: clamp(2rem, 10vw, 3.2rem);
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    color: var(--fg);
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    min-width: 0;
    min-height: 0;
    padding: 0;
    transition: background 0.12s, border-color 0.12s;
  }
  .cell:hover:not(.taken):not(:disabled) { background: var(--panel); border-color: var(--border-hi); }
  .cell:disabled { cursor: default; }
  .cell.taken { cursor: default; }
  .cell.x { color: var(--accent); }
  .cell.o { color: var(--accent-2); }
  .cell.win { border-color: var(--accent-2); background: rgba(138, 255, 193, 0.08); }
</style>
</head>
<body>
<main class="wrap">
  <div class="topbar">
    <h1>tic-tac-toe</h1>
    <a class="back" href="../">← all games</a>
  </div>
  <div class="panel">
    <div class="row">
      <p class="status" id="status">Your turn (X).</p>
      <button class="btn ghost tool-btn man-trigger" data-man="tic-tac-toe" data-man-title="TIC-TAC-TOE(1)" type="button">
        <span class="q">?</span> man
      </button>
    </div>
    <div class="board" id="board" role="grid" aria-label="Tic-tac-toe board"></div>
    <div class="controls center" style="justify-content:center">
      <button class="primary" id="reset">New game</button>
      <button id="toggle">Play as O</button>
    </div>
  </div>
</main>

<template id="man-tic-tac-toe">
  <h2>Name</h2>
  <p>tic-tac-toe — three in a row against an unbeatable AI.</p>

  <h2>Synopsis</h2>
  <p>Take turns marking cells on a 3×3 grid. First to line up three wins.</p>

  <h2>Rules</h2>
  <ul>
    <li>You play <strong>X</strong> by default; the AI plays <strong>O</strong>. Switch sides with <code>Play as O</code>.</li>
    <li>Win by getting three marks in a row, column, or diagonal.</li>
    <li>If the grid fills with no winner, it's a <strong>draw</strong>.</li>
  </ul>

  <h2>Controls</h2>
  <ul>
    <li><strong>Tap / click</strong> any empty cell to place your mark.</li>
    <li><code>New game</code> resets the board.</li>
  </ul>

  <h2>Notes</h2>
  <p class="muted">The AI uses full-tree minimax, so perfect play will always draw. Aim for a tie.</p>
</template>

<script defer src="../manpage.js"></script>
<script defer src="game.js"></script>
<script>window.addEventListener("load", () => Manpage.autoOpen("tic-tac-toe"));</script>
</body>
</html>
