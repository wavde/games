<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tic-Tac-Toe</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="../shared.css">
<style>
  .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: min(360px, 90vw); margin: 0 auto; aspect-ratio: 1; }
  .cell { background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; font-size: clamp(2rem, 10vw, 3.2rem); font-weight: 700; cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; user-select: none; }
  .cell:hover:not(.taken) { background: #262c3b; }
  .cell.x { color: var(--accent); }
  .cell.o { color: var(--accent-2); }
  .cell.win { background: #2a3a2a; border-color: var(--accent-2); }
  .center { text-align: center; }
</style>
</head>
<body>
<main class="wrap">
  <div class="topbar"><h1>❌⭕ Tic-Tac-Toe</h1><a class="back" href="../">← all games</a></div>
  <div class="panel">
    <p class="status" id="status">Your turn (X).</p>
    <div class="board" id="board"></div>
    <div class="controls center" style="justify-content:center">
      <button class="primary" id="reset">New game</button>
      <button id="toggle">Play as O</button>
    </div>
  </div>
</main>
<script src="game.js"></script>
</body>
</html>
