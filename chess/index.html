<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>chess · games</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="description" content="Chess — play against a minimax engine with alpha-beta pruning.">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="apple-touch-icon" href="../favicon.svg">
<link rel="manifest" href="../manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../shared.css">
<link rel="stylesheet" href="../manpage.css">
<style>
  .board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    width: min(560px, 94vw);
    aspect-ratio: 1;
    margin: 0 auto;
    border: 1px solid var(--border-hi);
    border-radius: var(--r-md);
    overflow: hidden;
    touch-action: manipulation;
  }
  .sq {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.4rem, 6vw, 2.6rem);
    cursor: pointer;
    user-select: none;
    position: relative;
    line-height: 1;
  }
  /* Amber-cream light + deep-walnut dark squares */
  .sq.light { background: #d9cfae; }
  .sq.dark  { background: #5a4a32; }
  .sq.sel   { outline: 3px solid var(--accent); outline-offset: -3px; z-index: 1; }
  .sq.last  { box-shadow: inset 0 0 0 3px rgba(245, 197, 66, 0.6); }
  .sq.hint::after {
    content: "";
    position: absolute;
    width: 28%; height: 28%;
    background: rgba(0, 0, 0, 0.28);
    border-radius: 50%;
  }
  .sq.cap::after {
    content: "";
    position: absolute;
    inset: 6%;
    border: 3px solid rgba(255, 107, 107, 0.65);
    border-radius: 50%;
  }
  .sq.w { color: #fff; text-shadow: 0 1px 0 #000, 0 0 2px #000; }
  .sq.b { color: #111; text-shadow: 0 1px 0 #fff8, 0 0 2px #fff8; }

  select {
    background: var(--panel-2);
    color: var(--fg);
    border: 1px solid var(--border-hi);
    border-radius: var(--r-md);
    padding: 8px 10px;
    font-family: inherit;
    font-size: var(--fs-sm);
    min-height: var(--tap);
  }
</style>
</head>
<body>
<main class="wrap">
  <div class="topbar">
    <h1>chess</h1>
    <a class="back" href="../">← all games</a>
  </div>
  <div class="panel">
    <div class="row">
      <p class="status" id="status">White to move.</p>
      <p class="status" id="info"></p>
      <button class="btn ghost tool-btn man-trigger" data-man="chess" data-man-title="CHESS(1)" type="button">
        <span class="q">?</span> man
      </button>
    </div>
    <div class="board" id="board"></div>
    <div class="controls" style="justify-content:center">
      <button class="primary" id="reset">New game</button>
      <button id="undo">Undo</button>
      <button id="flip">Flip board</button>
      <select id="level" aria-label="AI level">
        <option value="1">Easy (depth 1)</option>
        <option value="2" selected>Normal (depth 2)</option>
        <option value="3">Hard (depth 3)</option>
      </select>
      <select id="side" aria-label="Your side">
        <option value="w" selected>Play White</option>
        <option value="b">Play Black</option>
      </select>
    </div>
    <p class="footer-note">Tap a piece, then tap a destination. Pawns auto-promote to queen.</p>
  </div>
</main>

<template id="man-chess">
  <h2>Name</h2>
  <p>chess — full rules vs. a small minimax engine.</p>

  <h2>Rules</h2>
  <ul>
    <li>Standard chess: pieces move as they do in real chess, including <strong>castling</strong>, <strong>en passant</strong>, and <strong>pawn promotion</strong> (auto-queens).</li>
    <li>Deliver <strong>checkmate</strong> to win; the game ends in a draw on stalemate, insufficient material, or 50-move rule.</li>
  </ul>

  <h2>Controls</h2>
  <ul>
    <li><strong>Tap</strong> one of your pieces to select it. Legal destinations are highlighted with dots (moves) or rings (captures).</li>
    <li><strong>Tap a highlighted square</strong> to move there. Tap the piece again to deselect.</li>
    <li><code>Undo</code> takes back one full pair of moves (yours + the engine's).</li>
    <li><code>Flip board</code> rotates the view.</li>
    <li>Choose AI strength via the <code>Easy / Normal / Hard</code> selector — deeper search is stronger but slower.</li>
  </ul>

  <h2>Notes</h2>
  <p class="muted">The engine uses minimax with alpha-beta pruning and piece-square tables. At depth 3 it plays a decent casual game.</p>
</template>

<script src="game.js"></script>
<script defer src="../manpage.js"></script>
<script>window.addEventListener("load", () => Manpage.autoOpen("chess"));</script>
</body>
</html>
