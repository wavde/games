<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Minesweeper</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0f1115">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="../shared.css">
<style>
  .ms { display: grid; gap: 2px; background: #0b0e14; padding: 4px; border-radius: 8px; width: fit-content; margin: 0 auto; }
  .c { width: 28px; height: 28px; background: #2a3145; border-radius: 4px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.9rem; cursor:pointer; user-select:none; font-family: ui-monospace, monospace; }
  .c:hover { background: #334062; }
  .c.open { background: #151823; cursor: default; }
  .c.flag { background: #402a2a; color: var(--warn); }
  .c.mine { background: #4a1f1f; color: #ff9b9b; }
  .n1{color:#6ea8ff}.n2{color:#8affc1}.n3{color:#ffd166}.n4{color:#ff6b6b}
  .n5{color:#c88aff}.n6{color:#5fe0d2}.n7{color:#ffffff}.n8{color:#ff6b6b}
  select { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; }
</style>
</head>
<body>
<main class="wrap">
  <div class="topbar"><h1>💣 Minesweeper</h1><a class="back" href="../">← all games</a></div>
  <div class="panel">
    <p class="status" id="status">Click to reveal. Right-click (or long-press) to flag.</p>
    <div id="board" class="ms"></div>
    <div class="controls" style="justify-content:center">
      <button class="primary" id="reset">New game</button>
      <select id="diff">
        <option value="easy">Easy · 9×9 · 10 mines</option>
        <option value="medium" selected>Medium · 16×16 · 40</option>
        <option value="hard">Hard · 20×20 · 80</option>
      </select>
      <span id="mines" class="kbd">0 mines</span>
    </div>
  </div>
</main>
<script src="game.js"></script>
</body>
</html>
